
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TEACHER AI - Master Learning Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.puter.com/v2/"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <style>
    body {
      font-family: 'Inter', 'IBM Plex Sans Arabic', sans-serif;
      overflow-x: hidden;
      transition: background-color 0.3s ease;
      background-color: #050507;
      -webkit-tap-highlight-color: transparent;
    }
    .gradient-bg {
      background: radial-gradient(circle at top right, rgba(79, 70, 229, 0.08), transparent),
                  radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.08), transparent);
    }
    .glass {
      background: rgba(10, 10, 12, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }
    [dir="rtl"] {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
    }
    .sidebar-transition {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* المقبض الذكي للحافة */
    .sidebar-handle {
      width: 12px;
      height: 60px;
      background: rgba(79, 70, 229, 0.2);
      border-radius: 10px;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 100;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .sidebar-handle:hover {
      background: rgba(79, 70, 229, 0.6);
      width: 16px;
    }
    @media (max-width: 1024px) {
      .mobile-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.8);
        z-index: 35;
        backdrop-filter: blur(4px);
      }
    }

    /* ─── 3D & Motion Animations ─────────────────── */

    /* Subtle dot-grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(99,102,241,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridDrift 20s linear infinite;
    }
    @keyframes gridDrift {
      from { background-position: 0 0; }
      to   { background-position: 40px 40px; }
    }

    /* Neon text shimmer */
    @keyframes neonShimmer {
      0%,100% { text-shadow: 0 0 20px rgba(99,102,241,0.4), 0 0 60px rgba(99,102,241,0.2); }
      50%      { text-shadow: 0 0 40px rgba(139,92,246,0.7), 0 0 100px rgba(99,102,241,0.4); }
    }
    .neon-text { animation: neonShimmer 3s ease-in-out infinite; }

    /* Floating Y-axis */
    @keyframes floatY {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-14px); }
    }
    .float-anim { animation: floatY 5s ease-in-out infinite; }

    /* Slow rotation */
    @keyframes slowRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .slow-rotate { animation: slowRotate 18s linear infinite; }

    /* Orbit ring */
    @keyframes orbitRing {
      0%   { transform: rotateX(70deg) rotateZ(0deg); }
      100% { transform: rotateX(70deg) rotateZ(360deg); }
    }

    /* Gradient border glow */
    @keyframes borderGlow {
      0%,100% { border-color: rgba(99,102,241,0.2); box-shadow: 0 0 0 rgba(99,102,241,0); }
      50%      { border-color: rgba(139,92,246,0.5); box-shadow: 0 0 30px rgba(99,102,241,0.25); }
    }
    .border-glow { animation: borderGlow 4s ease-in-out infinite; }

    /* Card entrance */
    @keyframes cardEntrance {
      from { opacity:0; transform: translateY(30px) scale(0.95); }
      to   { opacity:1; transform: translateY(0)  scale(1); }
    }

    /* Scan line */
    @keyframes scanLine {
      0%   { top: 0%; opacity: 0.6; }
      100% { top: 100%; opacity: 0; }
    }

    /* Navbar gradient animation */
    nav {
      background: rgba(5,5,7,0.85) !important;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
    }

    /* Smooth scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg,#4f46e5,#7c3aed);
      border-radius: 10px;
    }

    /* Selection color */
    ::selection {
      background: rgba(99,102,241,0.35);
      color: #fff;
    }

    /* ─── PER-FEATURE ANIMATIONS ───────────────────── */

    /* ─ Chat message entrance */
    @keyframes msgSlideUp {
      from { opacity:0; transform: translateY(20px) scale(0.96); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }
    .msg-enter { animation: msgSlideUp 0.4s cubic-bezier(0.23,1,0.32,1) both; }

    /* ─ Typing bubble dots */
    @keyframes typingDot {
      0%,80%,100% { transform: scale(0.6); opacity:0.3; }
      40%          { transform: scale(1);   opacity:1; }
    }
    .typing-dot-1 { animation: typingDot 1.2s 0.0s infinite ease-in-out; }
    .typing-dot-2 { animation: typingDot 1.2s 0.2s infinite ease-in-out; }
    .typing-dot-3 { animation: typingDot 1.2s 0.4s infinite ease-in-out; }

    /* ─ Staggered entrance for list items */
    @keyframes staggerIn {
      from { opacity:0; transform: translateX(-20px); }
      to   { opacity:1; transform: translateX(0); }
    }
    .stagger-1  { animation: staggerIn 0.5s 0.05s both cubic-bezier(0.23,1,0.32,1); }
    .stagger-2  { animation: staggerIn 0.5s 0.10s both cubic-bezier(0.23,1,0.32,1); }
    .stagger-3  { animation: staggerIn 0.5s 0.15s both cubic-bezier(0.23,1,0.32,1); }
    .stagger-4  { animation: staggerIn 0.5s 0.20s both cubic-bezier(0.23,1,0.32,1); }
    .stagger-5  { animation: staggerIn 0.5s 0.25s both cubic-bezier(0.23,1,0.32,1); }
    .stagger-6  { animation: staggerIn 0.5s 0.30s both cubic-bezier(0.23,1,0.32,1); }

    /* ─ Shimmer sweep on cards/buttons */
    @keyframes shimmerSweep {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .shimmer-sweep {
      background: linear-gradient(90deg, transparent 25%, rgba(255,255,255,0.08) 50%, transparent 75%);
      background-size: 200% 100%;
      animation: shimmerSweep 2.5s linear infinite;
    }

    /* ─ Neon glow border pulse on focus */
    @keyframes glowBorder {
      0%,100% { box-shadow: 0 0 0px rgba(99,102,241,0); }
      50%      { box-shadow: 0 0 20px rgba(99,102,241,0.5), 0 0 40px rgba(99,102,241,0.2); }
    }
    .input-glow:focus { animation: glowBorder 2s ease-in-out infinite; }

    /* ─ Progress bar fill */
    @keyframes fillBar {
      from { width: 0%; }
      to   { width: var(--target-width, 100%); }
    }
    .progress-fill { animation: fillBar 1.2s cubic-bezier(0.23,1,0.32,1) both; }

    /* ─ Icon float-bob on hover */
    @keyframes bobFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    .icon-bob { animation: bobFloat 3s ease-in-out infinite; }

    /* ─ Spinner with neon trail */
    @keyframes neonSpin {
      from { transform: rotate(0deg); filter: hue-rotate(0deg); }
      to   { transform: rotate(360deg); filter: hue-rotate(360deg); }
    }
    .neon-spin { animation: neonSpin 1.4s linear infinite; }

    /* ─ Result card pop-in with bounce */
    @keyframes popIn {
      0%   { opacity:0; transform: scale(0.85) translateY(30px); }
      70%  { transform: scale(1.03) translateY(-4px); }
      100% { opacity:1; transform: scale(1) translateY(0); }
    }
    .pop-in { animation: popIn 0.55s cubic-bezier(0.23,1,0.32,1) both; }

    /* ─ Glow pulse on action button */
    @keyframes glowPulse {
      0%,100% { box-shadow: 0 0 20px rgba(99,102,241,0.3); }
      50%      { box-shadow: 0 0 50px rgba(99,102,241,0.7), 0 0 80px rgba(139,92,246,0.3); }
    }
    .btn-glow { animation: glowPulse 2.5s ease-in-out infinite; }

    /* ─ Islamic Hub: emerald glow */
    @keyframes emeraldGlow {
      0%,100% { box-shadow: 0 0 20px rgba(16,185,129,0.2); }
      50%      { box-shadow: 0 0 50px rgba(16,185,129,0.5), 0 0 80px rgba(16,185,129,0.2); }
    }
    .btn-emerald-glow { animation: emeraldGlow 2.5s ease-in-out infinite; }

    /* ─ Homework: solver step reveal */
    @keyframes stepReveal {
      from { opacity:0; transform: translateX(40px); }
      to   { opacity:1; transform: translateX(0); }
    }
    .step-reveal { animation: stepReveal 0.5s cubic-bezier(0.23,1,0.32,1) both; }

    /* ─ Writer: text shimmer on output */
    @keyframes textShimmer {
      from { background-position: 0% 50%; }
      to   { background-position: 100% 50%; }
    }
    .writer-output {
      background: linear-gradient(90deg, #f8fafc, #a5b4fc, #f8fafc);
      background-size: 200%;
      background-clip: text;
      -webkit-background-clip: text;
    }

    /* ─ PDF drop zone pulse */
    @keyframes dropZonePulse {
      0%,100% { border-color: rgba(99,102,241,0.2); background: rgba(99,102,241,0.03); }
      50%      { border-color: rgba(99,102,241,0.6); background: rgba(99,102,241,0.08); }
    }
    .drop-zone-active { animation: dropZonePulse 2s ease-in-out infinite; }

    /* ─ Link card slide-in (Islamic Hub results) */
    @keyframes linkSlide {
      from { opacity:0; transform: translateX(30px); }
      to   { opacity:1; transform: translateX(0); }
    }
    .link-card { animation: linkSlide 0.4s cubic-bezier(0.23,1,0.32,1) both; }
    .link-card:nth-child(1) { animation-delay:0.05s; }
    .link-card:nth-child(2) { animation-delay:0.10s; }
    .link-card:nth-child(3) { animation-delay:0.15s; }
    .link-card:nth-child(4) { animation-delay:0.20s; }
    .link-card:nth-child(5) { animation-delay:0.25s; }
    .link-card:nth-child(6) { animation-delay:0.30s; }
    .link-card:nth-child(7) { animation-delay:0.35s; }
    .link-card:nth-child(8) { animation-delay:0.40s; }

    /* ─ Settings card stagger */
    .settings-card {
      opacity: 0;
      animation: staggerIn 0.6s cubic-bezier(0.23,1,0.32,1) both;
    }
    .settings-card:nth-child(1) { animation-delay:0.1s; }
    .settings-card:nth-child(2) { animation-delay:0.2s; }
    .settings-card:nth-child(3) { animation-delay:0.3s; }

    /* ─ Rotate glow orb on Voice mode */
    @keyframes orbRotate {
      from { transform: rotate(0deg) scale(1); }
      50%  { transform: rotate(180deg) scale(1.1); }
      to   { transform: rotate(360deg) scale(1); }
    }
    .orb-rotate { animation: orbRotate 8s linear infinite; }

    /* ─ File generate: spinning cog */
    @keyframes cogSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .cog-spin { animation: cogSpin 2s linear infinite; }

    /* ─ Global: Animate-in shorthand classes */
    .anim-fade-up {
      opacity: 0;
      transform: translateY(24px);
      animation: msgSlideUp 0.6s cubic-bezier(0.23,1,0.32,1) 0.1s both;
    }
    .anim-pop {
      opacity: 0;
      animation: popIn 0.5s cubic-bezier(0.23,1,0.32,1) 0.1s both;
    }

    /* ─── NEW ADVANCED ANIMATIONS ADDED ───────────────── */

    /* ─ 1. Pulse Ring (Radar Effect for Mic/Active States) */
    @keyframes pulseRing {
      0% { transform: scale(0.8); opacity: 0.8; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { transform: scale(1.3); opacity: 0; box-shadow: 0 0 0 30px rgba(16, 185, 129, 0); }
      100% { transform: scale(0.8); opacity: 0; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
    .pulse-ring { animation: pulseRing 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }

    /* ─ 2. Glitch Hover Effect (For Titles or Cyberpunk feel) */
    @keyframes glitch {
      0% { transform: translate(0) }
      20% { transform: translate(-2px, 2px) }
      40% { transform: translate(-2px, -2px) }
      60% { transform: translate(2px, 2px) }
      80% { transform: translate(2px, -2px) }
      100% { transform: translate(0) }
    }
    .glitch-hover:hover { animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite; }

    /* ─ 3. Gradient Flow Text (Beautiful moving colors for text) */
    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .gradient-flow-text {
      background: linear-gradient(270deg, #4f46e5, #ec4899, #8b5cf6, #10b981, #4f46e5);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientFlow 6s ease infinite;
    }

    /* ─ 4. Breathe Float (Smooth levitation for Cards) */
    @keyframes breatheFloat {
      0%   { transform: translateY(0) scale(1); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
      50%  { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 30px rgba(16,185,129,0.15); }
      100% { transform: translateY(0) scale(1); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    }
    .breathe-float { animation: breatheFloat 4s ease-in-out infinite; }

    /* ─ 5. Jiggle Alert (For Errors or Invalid Inputs) */
    @keyframes jiggleAlert {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-5px) rotate(-2deg); }
      40% { transform: translateX(5px) rotate(2deg); }
      60% { transform: translateX(-5px) rotate(-2deg); }
      80% { transform: translateX(5px) rotate(2deg); }
    }
    .jiggle-alert { animation: jiggleAlert 0.5s ease-in-out; }

    /* ─ 6. Elastic Reveal (Super smooth bouncy entrance) */
    @keyframes elasticReveal {
      0% { transform: scale(0.5); opacity: 0; }
      60% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .elastic-reveal { animation: elasticReveal 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) both; }

  </style>

</script>

</head>
<body class="bg-[#050507] text-slate-100 min-h-screen gradient-bg">

</body>
